<html>
<head>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="panel">


        <!-- Side selector (mouse or arrow keys — not in the Tab ring) -->
        <div class="dpad">
            <div class="dpad-row">
                <div class="dpad-btn" id="side-top" data-side="top" title="Margin from top" role="button" tabindex="-1">▲</div>
            </div>
            <div class="dpad-row">
                <div class="dpad-btn" id="side-left" data-side="left" title="Margin from left" role="button" tabindex="-1">◀</div>
                <div class="dpad-btn dpad-center" id="side-center" data-side="center" title="Center on Path 1" role="button" tabindex="-1">◎</div>
                <div class="dpad-btn" id="side-right" data-side="right" title="Margin from right" role="button" tabindex="-1">▶</div>
            </div>
            <div class="dpad-row">
                <div class="dpad-btn" id="side-bottom" data-side="bottom" title="Margin from bottom" role="button" tabindex="-1">▼</div>
            </div>
        </div>

        <!-- Margin -->
        <div class="section-label" id="margin-label">Margin</div>
        <div class="stepper" id="stepper">
            <div class="step-btn" id="step-minus" title="−5" role="button" tabindex="-1">−</div>
            <div class="value-box" id="value-box" role="button" tabindex="0" draggable="true"
                 title="Click or Tab to type · right-click / drag down to save as preset">
                <span class="value-num" id="value-num">50</span>
                <span class="value-caret" id="value-caret"></span>
                <span class="value-unit">px</span>
            </div>
            <input class="margin-input" id="margin" type="text" inputmode="numeric" maxlength="5" value="50" spellcheck="false" />
            <div class="step-btn" id="step-plus" title="+5" role="button" tabindex="-1">+</div>
        </div>

        <!-- User presets: empty by default, filled via right-click / drag on the value -->
        <div class="presets" id="presets">
            <div class="preset-slot" data-index="0"></div>
            <div class="preset-slot" data-index="1"></div>
            <div class="preset-slot" data-index="2"></div>
        </div>

        <div class="apply-btn" id="apply" role="button" tabindex="0">APPLY</div>

        <div class="status hidden" id="status"></div>

    </div>
    <script src="index.js"></script>
</body>
</html>
