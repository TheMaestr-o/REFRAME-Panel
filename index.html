<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="panel">

        <div class="brand">
            <span class="brand-name">REFRAME</span>
            <span class="brand-ver">v2.1 · Maestro</span>
        </div>

        <!-- Side selector -->
        <div class="section-label">Side</div>
        <div class="dpad">
            <div class="dpad-row">
                <button class="dpad-btn" id="side-top" data-side="top" title="Margin from top">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="side-left" data-side="left" title="Margin from left">◀</button>
                <button class="dpad-btn dpad-center" id="side-center" data-side="center" title="Center on Path 1">◎</button>
                <button class="dpad-btn" id="side-right" data-side="right" title="Margin from right">▶</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="side-bottom" data-side="bottom" title="Margin from bottom">▼</button>
            </div>
        </div>

        <!-- Margin -->
        <div class="section-label" id="margin-label">Margin</div>
        <div class="stepper" id="stepper">
            <button class="step-btn" id="step-minus" title="−5">−</button>
            <div class="value-box" id="value-box" title="Click to type a value">
                <span class="value-num" id="value-num">50</span>
                <span class="value-unit">px</span>
            </div>
            <input class="margin-input" id="margin" type="text" inputmode="numeric" value="50" spellcheck="false" />
            <button class="step-btn" id="step-plus" title="+5">+</button>
        </div>

        <div class="presets" id="presets">
            <button class="preset-btn" data-val="30">30</button>
            <button class="preset-btn" data-val="50">50</button>
            <button class="preset-btn" data-val="60">60</button>
            <button class="preset-btn" data-val="100">100</button>
        </div>

        <button class="apply-btn" id="apply">APPLY</button>

        <div class="status" id="status">Ready</div>

        <div class="hint">↑ ↓ ← → side &nbsp;·&nbsp; C center &nbsp;·&nbsp; Enter apply</div>

    </div>
    <script src="index.js"></script>
</body>
</html>
